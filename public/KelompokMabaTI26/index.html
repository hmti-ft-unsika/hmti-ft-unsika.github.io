<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0F1E">
<title>Welcome To Teknik Industri</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0F1E;--s1:#0F1628;--s2:#141D35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F0F4FF;--sub:#7B8DB0;--dim:#3A4868;
  --ff:'Inter',system-ui,sans-serif;--accent:#4F8EF7;
}
html,body{height:100%;overflow:hidden}
body{min-height:100dvh;height:100dvh;background:var(--bg);font-family:var(--ff);display:flex;align-items:center;justify-content:center}
.amb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(90px);transition:background .7s,opacity .7s}
.a1{width:300px;height:300px;top:-100px;right:-80px;background:var(--accent);opacity:.055}
.a2{width:240px;height:240px;bottom:-80px;left:-60px;background:var(--accent);opacity:.035}

/* shell */
.shell{width:100%;max-width:390px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;flex-shrink:0}
.step-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.scroll-hint{font-size:11px;font-weight:500;color:var(--dim);letter-spacing:.05em;transition:opacity .4s}
.scroll-hint.hidden{opacity:0;pointer-events:none}

/* progress */
.prog-wrap{padding:0 20px;flex-shrink:0}
.prog-track{height:2px;background:var(--s2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .45s cubic-bezier(.4,0,.2,1)}

/* slide area */
.slide-area{flex:1;position:relative;overflow:hidden;margin-top:18px}
.slide{position:absolute;inset:0;padding:0 20px 16px;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.slide::-webkit-scrollbar{display:none}
.slide.in {animation:sIn  .35s cubic-bezier(.22,1,.36,1) both}
.slide.out{animation:sOut .22s ease both}
@keyframes sIn {from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
@keyframes sOut{to{opacity:0;transform:translateX(-16px)}}

/* content pieces */
.slide-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;border:1px solid var(--border)
}
.eyebrow{display:inline-flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;padding:4px 10px;border-radius:6px;margin-bottom:14px}
.slide-title{font-size:23px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:14px;letter-spacing:-.02em}
.slide-body p{font-size:14px;line-height:1.75;color:var(--sub);margin-bottom:12px}
.slide-body p b{color:var(--text);font-weight:600}

.cards{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.card{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;align-items:flex-start;gap:11px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px}
.ct{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.cs{font-size:12px;color:var(--sub);line-height:1.55}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:13px 10px;text-align:center}
.sv{font-size:20px;font-weight:700;line-height:1;margin-bottom:4px}
.sl{font-size:11px;color:var(--sub);font-weight:500}

.quote{border-left:2px solid var(--accent);padding:10px 13px;margin:14px 0;background:var(--s1);border-radius:0 10px 10px 0}
.quote p{font-size:13px;font-style:italic;color:var(--sub);margin:0;line-height:1.6}

.motto{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:15px;text-align:center;margin:14px 0}
.mm{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:3px}
.mt{font-size:11px;color:var(--sub)}

.dept-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 8px;border-radius:5px;display:inline-block;margin-bottom:8px}
.proker-list{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.pk{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:10px 13px}
.pk-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.pk-desc{font-size:12px;color:var(--sub);line-height:1.55}

.socials{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.srow{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.si{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;letter-spacing:.02em;flex-shrink:0}

.sentinel{height:1px;flex-shrink:0}

/* picker (group selection) */
.picker-grid{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.picker-card{
  display:flex;align-items:center;gap:12px;
  width:100%;text-align:left;
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
  font-family:var(--ff);cursor:pointer;
  transition:border-color .2s,transform .15s,background .2s;
  -webkit-user-select:none;user-select:none;
}
.picker-card:active{transform:scale(.97);background:var(--s2)}
.picker-card:hover{border-color:var(--pc,var(--accent))}
.picker-num{
  flex-shrink:0;width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}
.picker-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.picker-kelompok{font-size:13.5px;font-weight:600;color:var(--text)}
.picker-nama{font-size:12px;color:var(--sub)}
.picker-arrow{flex-shrink:0;color:var(--dim);font-size:15px}

/* bottom */
.bottom{flex-shrink:0;padding:14px 20px 0}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--ff);font-size:14.5px;font-weight:600;cursor:pointer;letter-spacing:-.01em;transition:opacity .2s,transform .15s;text-decoration:none;-webkit-user-select:none;user-select:none;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn:active{transform:scale(.97)}
.btn.locked{opacity:.3;cursor:default;pointer-events:none}

/* watermark */
.wm{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:10px 20px 20px}
.wm-inner{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--s2);border:1px solid var(--border);border-radius:20px}
.wm-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:background .4s}
.wm-text{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:.02em}
.wm-text b{color:var(--sub);font-weight:600}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="amb a1" id="a1"></div>
<div class="amb a2" id="a2"></div>
<div class="shell">
  <div class="topbar">
    <span class="step-lbl" id="stepLbl"></span>
    <span class="scroll-hint hidden" id="scrollHint">scroll ↓</span>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>

  <div class="wm">
    <div class="wm-inner">
      <div class="wm-dot" id="wmDot"></div>
      <span class="wm-text">Dibuat oleh <b>Departemen Pendidikan & Riset · HMTI FT UNSIKA</b></span>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   SAKLAR AKTIF / NONAKTIF WEBSITE
   
   Ganti  true  jadi  false  untuk MENUTUP website
   (semua link kelompok akan menampilkan halaman "ospek sudah berakhir").
   
   Ganti balik  false  jadi  true  untuk MEMBUKA lagi.
   
   Setelah ubah, simpan file ini lalu upload/commit ulang ke GitHub.
═══════════════════════════════════════════════════════ */
const WEBSITE_AKTIF = true;


/* ═══════════════════════════════════════════════════════
   DATA NARAHUBUNG PER KELOMPOK  (EDIT DI SINI SETIAP TAHUN)

   Cara ganti nomor / nama PJ:
   1. Cari baris nomor kelompoknya di bawah ini
   2. Ganti teks di dalam tanda kutip "..." untuk nama
   3. Ganti angka di dalam tanda kutip "..." untuk nomor WA
      Format wajib: 62 + nomor TANPA angka 0 di depan, TANPA spasi/strip
      Contoh nomor asli 0857-1608-7411  ->  ditulis  "6285716087411"
   4. Jangan hapus tanda kurung kurawal { }, koma, atau titik dua :
   5. Simpan file, lalu upload/commit ulang ke GitHub

   Mau tambah/kurangi jumlah kelompok? Tinggal tambah/hapus baris
   dengan pola yang sama (angka kelompok harus urut dan unik).

   Akses tiap kelompok via URL: ?kelompok=1  sampai  ?kelompok=8
   Contoh: selamat-datang-maba.html?kelompok=3
───────────────────────────────────────────────────────── */
const PJ_LIST = {
  1: { nama: "Kang Aufan",    wa: "628985618869" },
  2: { nama: "Kang Albert",   wa: "6285716087411" },
  3: { nama: "Kang Fauzan",   wa: "6281210194626" },
  4: { nama: "Kang Satrio",   wa: "6281585025624" },
  5: { nama: "Teh Syifa",     wa: "6285810292851" },
  6: { nama: "Teh Wina",      wa: "6288299082109" },
  7: { nama: "Teh Shelvina",  wa: "6285716471112" },
  8: { nama: "Teh Aqeela",    wa: "6285973972025" }
};

/* Validasi otomatis: cek format nomor WA supaya ketahuan kalau ada typo */
(function validatePJList(){
  Object.entries(PJ_LIST).forEach(([k, p]) => {
    const waOk = /^62\d{9,13}$/.test(p.wa);
    if (!waOk) {
      console.warn(`[PJ_LIST] Kelompok ${k} (${p.nama}): format nomor WA "${p.wa}" sepertinya salah. Pastikan diawali 62, tanpa spasi/strip/tanda plus.`);
    }
  });
})();

/* Ambil nomor kelompok dari URL, contoh: ?kelompok=2 */
const urlParams = new URLSearchParams(window.location.search);
const kelompokParam = parseInt(urlParams.get('kelompok'), 10);
const validKelompok = PJ_LIST.hasOwnProperty(kelompokParam) ? kelompokParam : null;

/* PJ selalu punya nilai (default ke Kelompok 1) supaya SLIDES tidak error.
   Halaman pemilih akan tampil dulu kalau validKelompok null. */
const activeKelompok = validKelompok || 1;
const PJ = {
  nama: PJ_LIST[activeKelompok].nama,
  kelompok: activeKelompok,
  wa: PJ_LIST[activeKelompok].wa,
  pesan: `Assalamualaikum Wr. Wb. / Selamat pagi, Kang/Teh.

Mohon maaf sebelumnya mengganggu waktunya. Perkenalkan, saya *[Nama Lengkap]*, mahasiswa baru Program Studi Teknik Industri dengan NIM *[NIM]*, yang tergabung dalam *Kelompok ${activeKelompok}*.
Atas perhatian dan kesediaannya, saya ucapkan terima kasih banyak, Kang/Teh.

Wassalamualaikum Wr. Wb.`
};

/* ─────────────────────────────────────────────────────
   SEMUA DATA BERSUMBER DARI hmti.ft.unsika.ac.id
   Diakses & diverifikasi 19 Juni 2026
───────────────────────────────────────────────────── */

  flask: '<path d="M9 3h6M10 3v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-2.5L14 9V3"/><path d="M7.5 14h9"/>',

};

function svgIcon(name, size=28){
  const path = ICONS[name] || '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}

/* 1 · Sambutan */
{ accent:"#4F8EF7", svg:"wave", eyebrow:"Selamat Datang",
  title:`Halo, Maba Kelompok ${PJ.kelompok}!`,
  html:`
    <p>Selamat! Kamu sekarang resmi menjadi bagian dari <b>Program Studi Teknik Industri, Fakultas Teknik, Universitas Singaperbangsa Karawang (UNSIKA)</b> dan tergabung di <b>Kelompok ${PJ.kelompok}</b> untuk kegiatan ospek angkatan ini.</p>
    <p>Sebelum kegiatan dimulai, yuk kenalan dulu sama prodi dan organisasi mahasiswamu. Scroll sampai bawah di setiap halaman untuk lanjut ke halaman berikutnya!</p>

      <div class="card"><div class="dot" style="background:#4F8EF7"></div><div><div class="ct">Prodi TI · Fakultas Teknik</div><div class="cs">Berdiri 1996 · SK No. 36/DIKTI/Kep/1996 · Akreditasi B (BAN-PT)</div></div></div>
      <div class="card"><div class="dot" style="background:#4F8EF7"></div><div><div class="ct">Gelar: Sarjana Teknik (S.T.)</div><div class="cs">Masa studi 8 semester · 144 SKS</div></div></div>
    </div>
  `
},

/* 2 · Tentang TI */
{ accent:"#34C98E", svg:"factory", eyebrow:"Mengenal Prodi",
  title:"Apa Itu Teknik Industri?",
  html:`
    <p><b>Teknik Industri (TI)</b> mempelajari cara merancang, mengoptimalkan, dan mengelola sistem yang terdiri dari manusia, mesin, material, informasi, dan energi secara efisien dan efektif.</p>
    <p>Prodi ini menggunakan kurikulum berbasis <b>Outcome-Based Education (OBE)</b> sesuai Standar Nasional Pendidikan Tinggi. Mahasiswa juga didorong aktif mengikuti program <b>Kampus Merdeka (MBKM)</b> untuk memperkaya pengalaman di luar kampus.</p>
    <div class="stats">
      <div class="stat"><div class="sv" style="color:#34C98E">1996</div><div class="sl">Tahun Berdiri</div></div>
      <div class="stat"><div class="sv" style="color:#34C98E">B</div><div class="sl">Akreditasi BAN-PT</div></div>

/* ── ENGINE ── */
let cur = 0;
const total = SLIDES.length;

function setAccent(hex){
  document.documentElement.style.setProperty('--accent',hex);
  document.getElementById('a1').style.background=hex;
  document.getElementById('a2').style.background=hex;
  document.getElementById('wmDot').style.background=hex;
}

function unlock(btn){
  btn.classList.remove('locked');
  btn.textContent='Lanjut →';
  document.getElementById('scrollHint').classList.add('hidden');
}

function render(){
  const slide=SLIDES[cur];
  setAccent(slide.accent);

  document.getElementById('stepLbl').textContent=
    `${String(cur+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
  document.getElementById('pFill').style.width=`${((cur+1)/total)*100}%`;

  /* remove old */
  const area=document.getElementById('slideArea');
  const old=area.querySelector('.slide');
  if(old){old.classList.add('out');setTimeout(()=>{if(old.parentNode)old.parentNode.removeChild(old)},220)}

  /* build new */
  const el=document.createElement('div');
  el.className='slide';
  el.innerHTML=
    `<span class="slide-icon" style="background:${slide.accent}14;color:${slide.accent}">${svgIcon(slide.svg)}</span>`+
    `<div class="eyebrow" style="color:${slide.accent};background:${slide.accent}1A">${slide.eyebrow}</div>`+
    `<h1 class="slide-title">${slide.title}</h1>`+
    `<div class="slide-body">${slide.html}</div>`+
    `<div class="sentinel"></div>`;
  area.appendChild(el);
  el.scrollTop=0;
  requestAnimationFrame(()=>el.classList.add('in'));

  /* buttons */
  const bottom=document.getElementById('bottom');

  if(slide.isLast){
    document.getElementById('scrollHint').classList.add('hidden');
    const url=`https://wa.me/${PJ.wa}?text=${encodeURIComponent(PJ.pesan)}`;
    bottom.innerHTML=
      `<a class="btn" href="${url}" target="_blank" rel="noopener" style="background:#25D366">`+
      `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`+
      `Hubungi ${PJ.nama} · Kelompok ${PJ.kelompok}</a>`;
    return;
  }

  bottom.innerHTML=
    `<button class="btn locked" id="btnNext" style="background:${slide.accent}">Baca dulu sampai bawah ↓</button>`;
  const btn=document.getElementById('btnNext');
  btn.addEventListener('click',()=>go(cur+1));

  /* scroll-unlock via IntersectionObserver — reliable on all Android browsers */
  const sentinel=el.querySelector('.sentinel');

  /* double-rAF ensures layout is complete before measuring */
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const needsScroll=el.scrollHeight>el.clientHeight+8;
    if(!needsScroll){unlock(btn);return;}

    document.getElementById('scrollHint').classList.remove('hidden');

    const obs=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting){unlock(btn);obs.disconnect();}
    },{root:el,threshold:0.5});
    obs.observe(sentinel);
  }));
}

function go(i){cur=Math.min(Math.max(i,0),total-1);render();}

/* ── Halaman pemilih kelompok (tampil kalau ?kelompok= tidak ada / salah) ── */
function renderPicker(){
  document.getElementById('stepLbl').textContent = 'Pilih Kelompok';
  document.getElementById('scrollHint').classList.add('hidden');
  document.getElementById('pFill').style.width = '0%';
  setAccent('#4F8EF7');

  const area = document.getElementById('slideArea');
  const el = document.createElement('div');
  el.className = 'slide in';

  const colors = ['#4F8EF7','#34C98E','#7B6EF6','#F5A623','#E05CCA'];
  const kelompokKeys = Object.keys(PJ_LIST).map(Number).sort((a,b)=>a-b);
  let cardsHTML = '';
  kelompokKeys.forEach((i, idx) => {
    const p = PJ_LIST[i];
    const c = colors[idx % colors.length];
    cardsHTML += `
      <button class="picker-card" data-kelompok="${i}" style="--pc:${c}">
        <span class="picker-num" style="background:${c}22;color:${c}">${i}</span>
        <span class="picker-info">
          <span class="picker-kelompok">Kelompok ${i}</span>
          <span class="picker-nama">${p.nama}</span>
        </span>
        <span class="picker-arrow">→</span>
      </button>`;
  });

  el.innerHTML = `
    <span class="slide-icon" style="background:#4F8EF714;color:#4F8EF7">${svgIcon('wave')}</span>
    <div class="eyebrow" style="color:#4F8EF7;background:#4F8EF71A">Maba Teknik Industri</div>
    <h1 class="slide-title">Kamu Kelompok Berapa?</h1>
    <div class="slide-body">
      <p>Pilih kelompok ospek kamu untuk melihat perkenalan dan narahubung yang sesuai.</p>
    </div>
    <div class="picker-grid">${cardsHTML}</div>
    <div class="sentinel"></div>
  `;
  area.appendChild(el);

  el.querySelectorAll('.picker-card').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.getAttribute('data-kelompok');
      const newUrl = window.location.pathname + '?kelompok=' + k;
      window.location.href = newUrl;
    });
  });

  document.getElementById('bottom').innerHTML = '';
}

/* ── Halaman "ditutup" — tampil kalau WEBSITE_AKTIF = false ── */
function renderClosed(){
  document.getElementById('stepLbl').textContent = '';
  document.getElementById('scrollHint').classList.add('hidden');
  document.getElementById('pFill').style.width = '100%';
  setAccent('#4F8EF7');

  const area = document.getElementById('slideArea');
  const el = document.createElement('div');
  el.className = 'slide in';
  el.innerHTML = `
    <span class="slide-icon" style="background:#4F8EF714;color:#4F8EF7">${svgIcon('door')}</span>
    <div class="eyebrow" style="color:#4F8EF7;background:#4F8EF71A">Periode Ospek Telah Berakhir</div>
    <h1 class="slide-title">Sampai Jumpa di Ospek Tahun Depan</h1>
    <div class="slide-body">
      <p>Halaman perkenalan dan pendaftaran grup untuk periode ospek ini sudah ditutup. Terima kasih sudah menjadi bagian dari kegiatan ospek Teknik Industri UNSIKA.</p>
      <p>Apabila kamu sudah tergabung di grup kelas, seluruh informasi perkuliahan akan tetap berlanjut di sana.</p>
    </div>
    <div class="sentinel"></div>
  `;
  area.appendChild(el);
  document.getElementById('bottom').innerHTML = '';
}

function boot(){
  if (!WEBSITE_AKTIF) {
    renderClosed();
    return;
  }

  if (validKelompok) {
    render();
  } else {
    renderPicker();
  }
}

boot();
</script>
